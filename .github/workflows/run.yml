name: Check Hilton Availability
on:
  repository_dispatch:
    types: [trigger_check]
  workflow_dispatch: # Allows manual testing from the UI

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Import Code Base
        uses: actions/checkout@v4

      - name: Initialize Python Core
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Web Dependencies
        run: pip install requests

      - name: Execute Live Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py
